<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Cookies</title>
  </head>
  <body>

    <h1>Login to the website</h1>

    <input type="text" id="firstname" placeholder="Firstname">
    <input type="email" id="email" placeholder="Email">


    <button onclick="setCookies()">Log me in</button><br>
    <br>
    <h1>Cookies</h1>
    <button onclick="showCookies()">Show the cookies</button>

	<script>
		
		function setCookies() {
  
  			const firstname = document.getElementById("firstname").value;
  			const email = document.getElementById("email").value;

  			document.cookie = "firstname=" + firstname + "; max-age=" + (60 * 60 * 24 *10);
  			document.cookie = "email=" + email + "; max-age=" + (60 * 60 * 24 *10);

  
		}

		function showCookies() {
  
  			const p = document.createElement("p");
  			p.innerHTML = "Email: " + getCookie("email") + " - Firstname: " + getCookie("firstname");

  			document.body.appendChild(p);
		}

		window.setCookies = setCookies;
		window.showCookies = showCookies;
	
		function getCookie(name) {

			const cookies = document.cookie.split("; ");

			for (const cookie of cookies) {
				const [key, value] = cookie.split("=");
				if (key === name) {
					return value;
				}
			}

			return "";

		}

	</script>


  </body>
</html>
